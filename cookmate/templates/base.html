<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookMate</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar">
    <!-- Static SVG leaf logo — no animation -->
    <a href="/" class="brand">
        <svg class="brand-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M16 3C10 3 5 8 5 15c0 5.5 3.5 10.2 8.5 11.8V28h5v-1.2C23.5 25.2 27 20.5 27 15c0-7-5-12-11-12z"
                  fill="var(--green)" opacity="0.18"/>
            <path d="M16 3c-1 4-3 7-6 9 1 4 4 7 6 8 2-1 5-4 6-8-3-2-5-5-6-9z"
                  fill="var(--green)"/>
            <line x1="16" y1="20" x2="16" y2="28" stroke="var(--green)" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        CookMate
    </a>

    <div class="nav-right">
        <a href="/"          {% if request.path == '/' %}class="active"{% endif %}>Home</a>
        <a href="/dashboard" {% if request.path == '/dashboard' %}class="active"{% endif %}>Dashboard</a>
        <a href="/logout" class="nav-logout">Logout</a>

        <!-- Theme toggle -->
        <button class="theme-toggle" id="theme-toggle" title="Toggle theme" aria-label="Toggle colour theme">
            🌙
        </button>
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

<script>
/* ── Theme management ───────────────────────────────────────────────────── */
(function () {
    const STORAGE_KEY = 'cm-theme';
    const toggle      = document.getElementById('theme-toggle');
    const html        = document.documentElement;

    // Icons for each explicit theme
    const ICONS = { light: '🌙', dark: '☀️', system: '💻' };

    // Cycle order: light → dark → system → light …
    const CYCLE = ['light', 'dark', 'system'];

    function getStored() {
        return localStorage.getItem(STORAGE_KEY) || 'system';
    }

    function applyTheme(theme) {
        if (theme === 'system') {
            html.removeAttribute('data-theme');
        } else {
            html.setAttribute('data-theme', theme);
        }
        toggle.textContent  = ICONS[theme];
        toggle.title        = `Theme: ${theme} — click to change`;
    }

    function cycleTheme() {
        const current = getStored();
        const next    = CYCLE[(CYCLE.indexOf(current) + 1) % CYCLE.length];
        localStorage.setItem(STORAGE_KEY, next);
        applyTheme(next);
    }

    // Apply on load (before paint to avoid flash)
    applyTheme(getStored());

    toggle.addEventListener('click', cycleTheme);
})();
</script>

</body>
</html>
